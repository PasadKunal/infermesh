version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: infermesh_postgres
    environment:
      POSTGRES_USER: infermesh
      POSTGRES_PASSWORD: infermesh123
      POSTGRES_DB: infermesh_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infermesh"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: infermesh_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: infermesh_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: infermesh_celery
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A app.celery_app.celery worker --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: infermesh_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
